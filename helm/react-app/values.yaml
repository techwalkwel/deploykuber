# ─── Replica count ────────────────────────────────────────────────────────────
replicaCount: 2

# ─── Container image ──────────────────────────────────────────────────────────
image:
  repository: techwalkwel98/hello-world
  tag: latest
  pullPolicy: IfNotPresent   # kind loads image locally; no need to pull from registry

# ─── Image pull secrets (leave empty if image is public) ──────────────────────
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ─── Service Account ──────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ─── Pod annotations / labels ─────────────────────────────────────────────────
podAnnotations: {}
podLabels: {}

# ─── Security Context ─────────────────────────────────────────────────────────
podSecurityContext: {}
securityContext: {}

# ─── Service ──────────────────────────────────────────────────────────────────
service:
  type: NodePort        # Change to LoadBalancer if using cloud provider
  port: 80
  nodePort: 30080       # Accessible on <NodeIP>:30080

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
  hosts:
    - host: react-app.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ─── Resources ────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# ─── Liveness / Readiness Probes ──────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# ─── Autoscaling ──────────────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# ─── Node selector / Tolerations / Affinity ──────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
